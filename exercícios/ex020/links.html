<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Links</title>

        <style>
            /*
            #  = id
            .  = class
            :  = pseudo-class
            :: = pseudo-element
            >  = children
            */

            body {
                font-family: Arial, Helvetica, sans-serif;
            }

            a {
                color: red;
                text-decoration: none;
                font-weight: bold;
            }

            a:visited {
                color: darkred;
            }

            a:hover {
                color: black;
                text-decoration: underline;
            }

            a:active {
                color: yellow;
            }

            a::before {
                content: "→ ";
            }

            a::after {
                content: " ←";
                text-decoration: none;
                font-weight: normal;
                color: darkgray;
            }

            /*
            #pseudo-elemento
            .especial::before {
                content: "→ ";
            }
            */
        </style>
    </head>
    <body>
        <h1>Personalizando Links</h1>
        <ul>
            <li><a href="https://github.com/gustavoguanabara/gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
            <li><a href="https://www.youtube.com/cursoemvideo" class="especial">Canal do YouTube</a></li>
            <li><a href="https://www.cursoemvideo.com">Site do CursoemVídeo</a></li>
        </ul>
    </body>
</html>
