<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Vídeos com HTML5</title>
    </head>
    <body>
        <h1>Inserindo vídeos hospedados localmente</h1>
        <p>Este vídeo esta hospedado no meu próprio servidor.</p>
        <video width="500" poster="imagens/limoes-capa.jpg" controls autoplay loop>
            <source src="midia/meu-video.mp4" type="video/mp4">
            <source src="midia/meu-video.webm" type="video/webm">
            <source src="midia/meu-video.m4v" type="video/mp4">
            <source src="midia/meu-video.ogv" type="video/ogg">
            <p>O seu navegador não tem compatibilidade com reprodução de vídeos.</p>
        </video>

        <h1>Inserindo vídeos do YouTube</h1>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/XFkzRNyygfk?si=tCQEXINHT2GB8t6g" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        
        <h1>Inserindo vídeos do Vimeo</h1>
        <iframe title="vimeo-player" src="https://player.vimeo.com/video/177118397?h=52d138b00e" width="640" height="360" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>

        <h1>Inserindo vídeos do Imgur</h1>
        <video controls width="300" autoplay muted loop>
            <source src="https://imgur.com/D4Tj9Ea.mp4" type="video/mp4">
            <p>Seu navegador não suporta esse formato de vídeo.</p>
        </video>
    </body>
<html>
